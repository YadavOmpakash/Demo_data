<!DOCTYPE html>
<html>
<body>

<h2>🔤 Text Change</h2>
<input id="t">
<button onclick="change()">Show</button>
<p id="out"></p>

<a href="index.html">⬅ Back</a>

<script>
function change(){
  document.getElementById("out").innerText =
  document.getElementById("t").value;
}
</script>

</body>
</html>
