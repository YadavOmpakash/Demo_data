<!DOCTYPE html>
<html>
<head>
  <title>SPA Dashboard</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

    body { display:flex; background:#f4f4f4; }

    .sidebar {
      width:250px;
      height:100vh;
      background:#1e293b;
      color:white;
      padding:20px;
    }

    .sidebar a {
      display:block;
      padding:10px;
      color:white;
      margin:5px 0;
      cursor:pointer;
    }

    .sidebar a:hover {
      background:#334155;
      border-radius:5px;
    }

    .main { flex:1; }

    .header {
      background:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      box-shadow:0 2px 5px gray;
    }

    .content { padding:20px; }

    .card {
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px gray;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    button {
      padding:5px 10px;
      background:green;
      color:white;
      border:none;
      cursor:pointer;
    }

    /* TIME BOX */
    .time-box {
      text-align:center;
      font-size:20px;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>OmPanel</h2>
  <a onclick="loadPage('dashboard')">Dashboard</a>
  <a onclick="loadPage('users')">Users</a>
  <a onclick="loadPage('reports')">Reports</a>
  <a onclick="loadPage('settings')">Settings</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h3 id="title">Dashboard</h3>
    <button onclick="toggleDark()">🌙</button>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

// SPA LOAD
function loadPage(page) {
  let content = document.getElementById("content");
  let title = document.getElementById("title");

  if (page === "dashboard") {
    title.innerText = "Dashboard";
    content.innerHTML = `
      <div class="card time-box">
        ⏰ Current Time
        <h1 id="time"></h1>
      </div>

      <div class="card"><h3>Users</h3><p>100</p></div>
      <div class="card"><h3>Revenue</h3><p>$5000</p></div>
    `;

    startTime(); // important
  }

  if (page === "users") {
    title.innerText = "Users";
    content.innerHTML = `
      <div class="card">
        <h3>User List</h3>
        <table>
          <tr><th>Name</th><th>Action</th></tr>
          <tr><td>Om</td><td><button onclick="deleteRow(this)">Delete</button></td></tr>
          <tr><td>Rahul</td><td><button onclick="deleteRow(this)">Delete</button></td></tr>
        </table>
      </div>
    `;
  }

  if (page === "reports") {
    title.innerText = "Reports";
    content.innerHTML = `
      <div class="card"><h3>Reports</h3><p>Analytics data</p></div>
    `;
  }

  if (page === "settings") {
    title.innerText = "Settings";
    content.innerHTML = `
      <div class="card"><h3>Settings</h3><p>Profile, Security</p></div>
    `;
  }
}

// TIME FUNCTION
function startTime() {
  setInterval(()=>{
    let el = document.getElementById("time");
    if(el){
      el.innerText = new Date().toLocaleTimeString();
    }
  },1000);
}

// DELETE ROW
function deleteRow(btn) {
  btn.parentElement.parentElement.remove();
}

// DARK MODE
function toggleDark() {
  document.body.style.background =
    document.body.style.background === "black" ? "#f4f4f4" : "black";
}

// DEFAULT LOAD
loadPage("dashboard");

</script>

</body>
</html>
