<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Om Pro App</title>

<meta name="google-site-verification" content="SIyi6jhs7rCPfWUsPHfxfEFWW_gHCr5W9z0pE-DpUOo" />

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🚀 Om Pro</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="page1.html">Time</a>
  <a href="page2.html">Calc</a>
  <a href="page3.html">Emoji</a>
</nav>

<!-- LOGIN -->
<div id="loginBox" class="center">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

  <!-- PROFILE -->
  <div class="profile">
    <img id="profilePic">
    <h2>Om Prakash Yadav</h2>
    <input type="file" onchange="loadImage(event)">
  </div>

  <!-- CAMERA -->
  <div class="center">
    <video id="video" width="250" autoplay></video><br>
    <button onclick="startCamera()">Start Camera</button>
  </div>

  <!-- TOOLS -->
  <div class="container">
    <div class="card">
      <h3>Calculator</h3>
      <button onclick="openPage('https://www.google.com/search?q=calculator')">Open</button>
    </div>
  </div>

  <iframe id="frame" width="100%" height="200"></iframe>

  <!-- COMMENT -->
  <div class="center">
    <textarea id="comment"></textarea><br>
    <button onclick="addComment()">Comment</button>
    <p id="showComment"></p>
  </div>

  <!-- SOCIAL -->
  <div class="center">
    <h3>Create Post</h3>

    <textarea id="postText"></textarea><br>
    <input type="file" id="imageUpload"><br><br>

    <input id="search" placeholder="Search..." onkeyup="searchPosts()"><br><br>

    <button onclick="addPost()">Post</button>
    <button onclick="toggleDarkMode()">🌙</button>

    <div id="posts"></div>
  </div>

</div>

<footer>
  <p>© Om Prakash Yadav</p>
  <button onclick="changeColor()">Change Color</button>
</footer>

<script src="script.js"></script>

</body>
</html>
