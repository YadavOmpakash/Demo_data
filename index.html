<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Om Pro App</title>

<!-- Google Verification -->
<meta name="google-site-verification" content="SIyi6jhs7rCPfWUsPHfxfEFWW_gHCr5W9z0pE-DpUOo" />

<link rel="stylesheet" href="style.css">

<style>
body { font-family: Arial; margin:0; background:#f0f2f5; }

header { background:#1877f2; color:white; text-align:center; padding:10px; }

nav {
  background:#333;
  text-align:center;
  padding:10px;
}
nav a {
  color:white;
  margin:10px;
  text-decoration:none;
}

.container { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

.profile { text-align:center; margin:20px; }
.profile img { width:120px; border-radius:50%; }

.post { background:white; margin:10px auto; padding:10px; border-radius:10px; width:90%; }

.dark { background:#111; color:white; }
.dark .post { background:#222; }

footer { background:#111; color:white; text-align:center; padding:10px; }

</style>

</head>

<body>

<header>
  <h1>🚀 Om Pro</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="page1.html">Time</a>
  <a href="page2.html">Calc</a>
  <a href="page3.html">Emoji</a>
</nav>

<!-- LOGIN -->
<div id="loginBox" style="text-align:center;">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<!-- PROFILE -->
<div class="profile">
<img id="profilePic">
<h2>Om Prakash Yadav</h2>
<input type="file" onchange="loadImage(event)">
</div>

<!-- CAMERA -->
<div style="text-align:center;">
<video id="video" width="250" autoplay></video><br>
<button onclick="startCamera()">Start Camera</button>
</div>

<!-- TOOLS -->
<div class="container">
<div class="card">
<h3>Calculator</h3>
<button onclick="openPage('https://www.google.com/search?q=calculator')">Open</button>
</div>
</div>

<iframe id="frame" width="100%" height="200"></iframe>

<!-- COMMENT -->
<div style="text-align:center;">
<textarea id="comment"></textarea><br>
<button onclick="addComment()">Comment</button>
<p id="showComment"></p>
</div>

<!-- SOCIAL -->
<div style="text-align:center;">
<h3>Create Post</h3>

<textarea id="postText"></textarea><br>
<input type="file" id="imageUpload"><br><br>

<input id="search" placeholder="Search..." onkeyup="searchPosts()"><br><br>

<button onclick="addPost()">Post</button>
<button onclick="toggleDarkMode()">🌙</button>

<div id="posts"></div>
</div>

</div>

<footer>
<p>© Om Prakash Yadav</p>
<button onclick="changeColor()">Change Color</button>
</footer>

<script>

// LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="om" && p==="123"){
document.getElementById("main").style.display="block";
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("msg").innerText="Wrong Login";
}
}

// PROFILE IMAGE
function loadImage(e){
document.getElementById("profilePic").src =
URL.createObjectURL(e.target.files[0]);
}

// CAMERA
function startCamera(){
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>document.getElementById("video").srcObject=s);
}

// COMMENT
function addComment(){
document.getElementById("showComment").innerText =
document.getElementById("comment").value;
}

// IFRAME
function openPage(p){
document.getElementById("frame").src=p;
}

// COLOR
function changeColor(){
document.body.style.background =
"#"+Math.floor(Math.random()*16777215).toString(16);
}

// POSTS
function addPost(){
let text=document.getElementById("postText").value;
let file=document.getElementById("imageUpload").files[0];

if(!text && !file) return;

let reader=new FileReader();

reader.onload=function(e){
let post=document.createElement("div");
post.className="post";

post.innerHTML=`
<p>${text}</p>
${file?`<img src="${e.target.result}" width="100%">`:``}
<button onclick="likePost(this)">🤍 Like</button>
`;

document.getElementById("posts").prepend(post);
};

if(file) reader.readAsDataURL(file);
else reader.onload({target:{result:""}});

document.getElementById("postText").value="";
document.getElementById("imageUpload").value="";
}

// LIKE
function likePost(btn){
btn.innerText = btn.innerText==="🤍 Like" ? "❤️ Liked" : "🤍 Like";
}

// SEARCH
function searchPosts(){
let val=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".post").forEach(p=>{
p.style.display = p.innerText.toLowerCase().includes(val) ? "block":"none";
});
}

// DARK MODE
function toggleDarkMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
