<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Om Advanced App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🚀 Om Advanced App</h1>
  <button onclick="toggleDark()">🌙</button>
</header>

<nav>
  <a href="#form">Form</a>
  <a href="#list">List</a>
  <a href="#media">Media</a>
  <a href="#upload">Upload</a>
</nav>

<main>

<!-- FORM -->
<section id="form">
  <h2>Add User</h2>
  <form id="formData">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <button type="submit">Add</button>
  </form>
</section>

<!-- LIST -->
<section id="list">
  <h2>User List</h2>
  <table>
    <thead>
      <tr><th>Name</th><th>Email</th><th>Delete</th></tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</section>

<!-- FILE UPLOAD -->
<section id="upload">
  <h2>📁 Upload File</h2>
  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>
  <p id="fileName"></p>
</section>

<!-- DOWNLOAD -->
<section>
  <h2>⬇️ Download File</h2>
  <button onclick="downloadFile()">Download Sample</button>
</section>

<!-- CAMERA -->
<section>
  <h2>📷 Camera</h2>
  <video id="camera" autoplay></video>
  <button onclick="startCamera()">Open Camera</button>
</section>

<!-- IMAGE PREVIEW -->
<section>
  <h2>🖼️ Image Preview</h2>
  <input type="file" id="imgInput" accept="image/*">
  <img id="preview" width="200">
</section>

<!-- SOCIAL LINKS -->
<section id="media">
  <h2>🌐 Social Links</h2>
  <a href="https://www.facebook.com" target="_blank">Facebook</a><br>
  <a href="https://www.instagram.com" target="_blank">Instagram</a><br>
  <a href="https://www.linkedin.com" target="_blank">LinkedIn</a><br>
  <a href="https://github.com" target="_blank">GitHub</a>
</section>

</main>

<footer>
  <p>© 2026 Om App</p>
</footer>

<script src="script.js"></script>
</body>
</html>
